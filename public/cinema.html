<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioskopi :: FilmBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body data-bs-theme="dark">
    <div class="container">
        <div class="card">
            <div class="card-header fw-bold">
                Dostupni Bioskopi
            </div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Naziv</th>
                            <th scope="col">Lokacija</th>
                            <th scope="col">Opcije</th>
                        </tr>
                    </thead>
                    <tbody id="cinemas"></tbody>
                </table>
            </div>
            <div class="card-footer">
                <a href="/new-cinema.html" class="btn btn-primary">Dodaj Bioskop</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/utils.js"></script>
    <script>
        const table = document.getElementById('cinemas')

        function edit(id) {
            window.location.href = '/edit-cinema.html?id=' + id
        }

        function remove(id) {
            showConfirm(`Obrisi bioskop ${id}?`, () => {
                fetch(`/api/cinema/${id}`, { method: 'delete' })
                    .then(rsp => window.location.reload())
            })
        }

        retrieveData('/api/cinema', (data) => {
            let content = ''
            for (let cinema of data) {
                content += `
                    <tr>
                        <th scope="row">${cinema.cinemaId}</th>
                        <td>${cinema.name}</td>
                        <td>${cinema.address}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-success" type="button" onclick="edit(${cinema.cinemaId})">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" type="button" onclick="remove(${cinema.cinemaId})">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    `
            }
            table.innerHTML = content
        })
    </script>
</body>

</html>
